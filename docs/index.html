<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPC-157 Evidence Library</title>
    <meta
      name="description"
      content="Public dashboard for BPC-157 history, real studies, source notes, and research workflow."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop backdrop-one"></div>
    <div class="backdrop backdrop-two"></div>
    <main class="shell">
      <section class="hero panel reveal">
        <p class="eyebrow">Evidence dashboard</p>
        <div class="hero-grid">
          <div>
            <h1 id="project-title">BPC-157 Evidence Library</h1>
            <p id="project-subtitle" class="lede"></p>
          </div>
          <div class="hero-actions">
            <a id="repo-link" class="button button-primary" href="#" target="_blank" rel="noreferrer">Open repository</a>
            <a class="button button-secondary" href="#sources">Browse sources</a>
          </div>
        </div>
        <div id="key-findings" class="findings"></div>
      </section>

      <section class="grid two-up">
        <article class="panel reveal">
          <p class="section-label">At a glance</p>
          <div id="stats" class="stats"></div>
        </article>
        <article class="panel reveal">
          <p class="section-label">Research question</p>
          <p id="research-question" class="body-copy"></p>
          <p id="reviewed-date" class="meta"></p>
        </article>
      </section>

      <section class="grid two-up">
        <article class="panel reveal">
          <p class="section-label">Librarian workflow</p>
          <div id="workflow"></div>
        </article>
        <article class="panel reveal">
          <p class="section-label">Agent memory</p>
          <div id="agent-memory"></div>
        </article>
      </section>

      <section class="panel reveal" id="reports">
        <div class="section-head">
          <div>
            <p class="section-label">Summary reports</p>
            <h2>Current reading set</h2>
          </div>
        </div>
        <div id="report-list" class="report-list"></div>
      </section>

      <section class="panel reveal" id="sources">
        <div class="section-head sources-head">
          <div>
            <p class="section-label">Source catalog</p>
            <h2>Traceable material</h2>
          </div>
          <div id="filters" class="filters"></div>
        </div>
        <div id="source-list" class="source-list"></div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
